<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>Alpasim Webviz 仿真调试台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; overflow: hidden; background: #f1f5f9; }
        .resizer-h { width: 4px; cursor: col-resize; z-index: 30; }
        .resizer-h:hover { background: #38bdf8; }
        .resizer-v { height: 4px; cursor: row-resize; z-index: 30; }
        .resizer-v:hover { background: #38bdf8; }
        
        input[type="range"] { -webkit-appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { height: 14px; width: 14px; border-radius: 50%; background: #ffffff; border: 2px solid #0ea5e9; cursor: pointer; -webkit-appearance: none; margin-top: -5px; box-shadow: 0 0 10px rgba(14, 165, 233, 0.5); }
        
        canvas { image-rendering: -webkit-optimize-contrast; }
        .session-item:hover .attach-btn { opacity: 1; }
    </style>
</head>
<body class="h-screen flex flex-col text-slate-800 font-medium text-[13px]">
    <!-- Top Nav -->
    <header class="h-10 bg-white border-b border-slate-200 flex items-center justify-between px-4 shrink-0 z-50">
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2">
                <i data-lucide="component" class="w-4 h-4 text-brand-600"></i>
                <span class="font-black text-[11px] tracking-tighter text-slate-900 uppercase">Alpasim <span class="text-brand-500">Webviz v2.0</span></span>
            </div>
            <div class="h-4 w-px bg-slate-200 mx-2"></div>
            <div class="flex items-center space-x-4 text-[10px] font-bold text-slate-500">
                <span id="session-status" class="flex items-center uppercase"><span class="w-2 h-2 rounded-full bg-slate-300 mr-2" id="status-indicator"></span>未连接</span>
                <span>帧 ID: <span id="session-tick" class="text-slate-900 font-mono">-</span></span>
                <span id="session-time">-</span>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <button id="reconnect-last" class="text-[9px] font-black text-slate-400 hover:text-brand-600 transition-all uppercase tracking-widest border border-slate-200 px-2 py-1 rounded-lg hover:border-brand-200 bg-slate-50 hidden">
                Reconnect Last Session
            </button>
            <div class="flex items-center space-x-3 pr-4 border-r border-slate-100">
                <span class="text-[9px] font-black text-slate-400 uppercase">Speed</span>
                <span id="ego-speed" class="font-mono text-sm font-bold text-brand-600">-</span>
            </div>
            <button id="refresh-state" class="text-slate-400 hover:text-brand-500 transition-colors"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- LEFT Sidebar -->
        <aside id="panel-left" class="w-72 bg-white border-r border-slate-200 flex flex-col overflow-hidden shrink-0">
            <div class="p-4 space-y-6 overflow-y-auto flex-1">
                <!-- Session Manager -->
                <section>
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center"><i data-lucide="monitor" class="w-3 h-3 mr-1.5 text-brand-600"></i> 会话管理</h3>
                        <button id="list-sessions" class="text-[9px] font-bold text-brand-500 hover:underline">刷新列表</button>
                    </div>
                    <div id="sessions-container" class="space-y-1.5 mb-4">
                        <div class="text-[10px] text-slate-400 italic text-center py-2 border border-dashed border-slate-100 rounded-lg">无活跃会话</div>
                    </div>
                    <div class="space-y-3 pt-3 border-t border-slate-50">
                        <input id="scene-id" placeholder="输入新场景 ID..." class="w-full text-xs border border-slate-200 rounded-lg p-2 outline-none focus:ring-2 focus:ring-brand-500/20" />
                        <button id="create-session" class="w-full bg-slate-900 text-white text-[10px] font-black py-2.5 rounded-lg hover:bg-slate-800 transition-all uppercase">创建新会话</button>
                    </div>
                </section>

                <section>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center"><i data-lucide="history" class="w-3 h-3 mr-1.5"></i> 历史检查点</h3>
                    <div id="checkpoint-list" class="space-y-2"></div>
                </section>
            </div>
        </aside>

        <div class="resizer-h" id="resizer-l"></div>

        <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
            <div id="panel-map" class="flex-1 relative bg-white overflow-hidden">
                <canvas id="map-canvas" class="w-full h-full"></canvas>
                <div class="absolute top-4 left-4 bg-white/90 border border-slate-200 px-3 py-1.5 rounded-xl shadow-sm flex items-center space-x-2 pointer-events-none">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5 text-brand-600"></i>
                    <span id="scene-label" class="text-[11px] font-black text-slate-700 uppercase">-</span>
                </div>
                <div class="absolute top-4 right-4 flex flex-col space-y-1">
                    <button onclick="window.map.zoomIn()" class="bg-white border border-slate-200 p-2 rounded-lg shadow hover:bg-slate-50"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    <button onclick="window.map.zoomOut()" class="bg-white border border-slate-200 p-2 rounded-lg shadow hover:bg-slate-50"><i data-lucide="minus" class="w-4 h-4"></i></button>
                    <button id="lock-ego" class="bg-white border border-slate-200 p-2 rounded-lg shadow hover:bg-slate-50"><i data-lucide="crosshair" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="resizer-v" id="resizer-m"></div>

            <div id="panel-bottom" class="h-64 bg-white border-t border-slate-200 flex">
                <div class="w-1/2 border-r border-slate-100 flex flex-col min-w-0">
                    <div class="h-8 bg-slate-50 border-b border-slate-100 px-4 flex items-center justify-between">
                        <span class="text-[9px] font-black text-slate-400 uppercase">传感器视角</span>
                        <div id="sensor-tabs" class="flex gap-1"></div>
                    </div>
                    <div class="flex-1 bg-slate-100 flex items-center justify-center overflow-hidden">
                        <img id="primary-sensor-image" class="max-w-full max-h-full" />
                    </div>
                </div>
                <div class="w-1/2 flex flex-col min-w-0 p-4">
                    <span class="text-[9px] font-black text-slate-400 uppercase mb-2">速度趋势</span>
                    <canvas id="chart-canvas" class="flex-1"></canvas>
                </div>
            </div>
        </main>

        <div class="resizer-h" id="resizer-r"></div>

        <aside id="panel-right" class="w-72 bg-white border-l border-slate-200 flex flex-col shrink-0">
            <div class="p-4 flex-1 flex flex-col overflow-hidden text-[11px]">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center"><i data-lucide="brain-circuit" class="w-3 h-3 mr-1.5 text-brand-600"></i> 决策链路</h3>
                <div id="candidate-list" class="flex-1 space-y-2 overflow-y-auto"></div>
            </div>
        </aside>
    </div>

    <!-- Footer -->
    <footer class="h-16 bg-slate-900 flex items-center px-8 space-x-12 shrink-0 shadow-2xl">
        <div class="w-44">
            <div id="playback-mode" class="text-[8px] font-black text-brand-400 uppercase tracking-widest mb-0.5">实时同步</div>
            <div class="text-sm font-mono text-white">
                <span id="timeline-current" class="font-bold">T0</span>
                <span class="text-slate-600">/</span>
                <span id="timeline-end" class="text-slate-500 italic">T0</span>
            </div>
        </div>
        <div class="flex-1 px-4">
            <input id="timeline-slider" type="range" min="0" max="0" value="0" class="w-full" />
        </div>
        <div class="flex items-center space-x-3 shrink-0">
            <div class="flex bg-slate-800 rounded-xl p-1 border border-slate-700">
                <button id="prev-frame" class="p-2 text-slate-400 hover:text-white" title="前一帧"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                <button id="play-session" class="p-2 text-emerald-400"><i data-lucide="play" class="w-4 h-4 fill-emerald-400/20"></i></button>
                <button id="pause-session" class="p-2 text-white"><i data-lucide="pause" class="w-4 h-4 fill-white/20"></i></button>
                <button id="next-frame" class="p-2 text-slate-400 hover:text-white" title="下一帧"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
            </div>
            <button id="live-jump" class="bg-brand-600 text-white text-[10px] font-black px-5 py-2 rounded-lg shadow-lg uppercase">回到实时</button>
        </div>
    </footer>

    <script type="module" src="/assets/app.js"></script>
</body>
</html>
