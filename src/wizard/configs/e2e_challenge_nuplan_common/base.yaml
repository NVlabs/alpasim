# @package _global_
# Shared NuPlan/MTGS challenge wiring.

defines:
  filesystem: ${repo-relative:"data"}
  worldengine_root: ${oc.env:ALPASIM_NUPLAN_ROOT}

wizard:
  validate_mount_points: true
  debug_flags:
    use_localhost: true
  run_sim_services: ["renderer", "controller", "runtime"]
  external_services:
    driver:
      - "${oc.env:ALPASIM_DRIVER_HOST,localhost}:${oc.env:ALPASIM_DRIVER_PORT,6789}"

services:
  renderer:
    image: ${defines.base_image}
    external_image: false
    volumes:
      - "${wizard.log_dir}:/mnt/log_dir"
      - "${defines.worldengine_root}:${defines.worldengine_root}"
      - "${repo-relative:'src'}:/repo/src"
      - "${repo-relative:'plugins'}:/repo/plugins"
    environments:
      - UV_LINK_MODE=copy
      # Build gsplat's CUDA kernels for sm_90 + PTX
      - "TORCH_CUDA_ARCH_LIST=8.9;9.0+PTX"
    command:
      - "uv run alpasim-mtgs-server"
      - "--user-config=/mnt/log_dir/{runtime_config_name}"
      - "--host=0.0.0.0"
      - "--port={port}"
      - "--cache-size=${defines.nre_cache_size}"
      - "--log-level=${wizard.log_level}"

  runtime:
    depends_on:
      - renderer
      - controller
    volumes:
      - "${defines.worldengine_root}:${defines.worldengine_root}"
      - "${wizard.log_dir}:/mnt/log_dir"
      - "${or:${wizard.array_job_dir},${wizard.log_dir}}:/mnt/array_job_dir"
      - "${repo-relative:'src'}:/repo/src"
      - "${repo-relative:'plugins'}:/repo/plugins"

scenes:
  scene_cache: ${defines.worldengine_root}
  test_suite_id: null

runtime:
  scene_provider:
    kind: trajdata
    usdz: null
    trajdata:
      cache_location: ${defines.worldengine_root}
      desired_dt: 0.1
      load_vector_map: true
      vector_map_params:
        incl_road_lanes: true
        incl_road_edges: true
        incl_traffic_signs: true
        incl_wait_lines: true
        collate: false
        keep_in_memory: true
      rebuild_cache: false
      rebuild_maps: false
      num_workers: 4
      dataset:
        name: nuplan_test
        data_dir: ${defines.worldengine_root}
        extra_params:
          config_dir: ${defines.worldengine_root}/navtest/configs
          num_timesteps_before: 30
          num_timesteps_after: 80
          asset_base_path: ${defines.worldengine_root}

  renderer:
    kind: sensorsim
    video_model_config: null

  smooth_trajectories: false
  enable_autoresume: false
  nr_workers: 1

  endpoints:
    renderer:
      n_concurrent_rollouts: 1
      skip: false
    controller:
      n_concurrent_rollouts: 1
      skip: false
    driver:
      n_concurrent_rollouts: 1
      skip: false
    physics:
      n_concurrent_rollouts: 1
      skip: true
    trafficsim:
      n_concurrent_rollouts: 1
      skip: true

  simulation_config:
    n_sim_steps: 200
    n_rollouts: 1
    control_timestep_us: 500_000
    force_gt_duration_us: 500_000
    planner_delay_us: 0
    min_traffic_duration_us: 0
    physics_update_mode: NONE
    route_generator_type: RECORDED
    assert_zero_decision_delay: false
    send_recording_ground_truth: false
    cameras:
      - logical_id: CAM_F0
        frame_interval_us: 500_000
        height: 1080
        width: 1920
      - logical_id: CAM_L0
        frame_interval_us: 500_000
        height: 1080
        width: 1920
      - logical_id: CAM_L1
        frame_interval_us: 500_000
        height: 1080
        width: 1920
      - logical_id: CAM_L2
        frame_interval_us: 500_000
        height: 1080
        width: 1920
      - logical_id: CAM_R0
        frame_interval_us: 500_000
        height: 1080
        width: 1920
      - logical_id: CAM_R1
        frame_interval_us: 500_000
        height: 1080
        width: 1920
      - logical_id: CAM_R2
        frame_interval_us: 500_000
        height: 1080
        width: 1920
      - logical_id: CAM_B0
        frame_interval_us: 500_000
        height: 1080
        width: 1920

eval:
  num_processes: 1
  allow_aggregation_with_failed_rollouts: true
  parse_unstructured_debug_info: false
  scene_score:
    enabled: true
  scorers:
    image:
      camera_logical_id: CAM_F0
  database:
    upload_metadata: false
    upload_leaderboard: false
    upload_full_metrics: false
  video:
    camera_id_to_render: CAM_F0
    overlay_plans_on_camera: false
    combined_video_speed_factor: 1.0
